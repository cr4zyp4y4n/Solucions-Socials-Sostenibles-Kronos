# Next.js en Netlify (OpenNext): no uses el patrón del portal-fichajes (Vite + dist + SPA redirect).
#
# Base directory en Netlify (Site settings → Build & deploy):
# - Repo Kronos (raíz = esta carpeta padre, como en GitHub Solucions-Socials-Sostenibles-Kronos): portal-firma
# - Repo monorepo cuya raíz es "Administracio Management App" con subcarpeta: seleccion-proveedores/portal-firma
#
# Variables de entorno (Site → Environment variables), mismas claves que .env.local:
# NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
# TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM, TWILIO_API_BASE (opcional),
# FIRMA_SMS_API_SECRET (debe coincidir con seleccion-proveedores/.env en Kronos).

[build]
  command = "npm run build"
  # Debe ser distinto del base directory (portal-firma); si no, @netlify/plugin-nextjs falla.
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Sin este plugin, Netlify trata el sitio como estático y / da 404 (no hay index.html en la raíz del repo).
[[plugins]]
  package = "@netlify/plugin-nextjs"
